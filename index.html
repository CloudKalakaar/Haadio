<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Haadio - Retro Music Player</title>
    <link rel="stylesheet" href="style.css?v=34">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="file_000000004ed071fb8190e340809155c9.png">
    <meta name="theme-color" content="#1e222a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Haadio">
    <link rel="apple-touch-icon" sizes="180x180" href="file_000000004ed071fb8190e340809155c9.png">
    
    <!-- Google Fonts for Retro/Modern look -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="home-backdrop"></div>
    <div class="app-container">
        <!-- Sidebar / Topbar depending on screen -->
        <header class="header">
            <div class="logo">
                <img src="file_000000004ed071fb8190e340809155c9.png" alt="Haadio Logo">
                <h1>Haadio</h1>
            </div>
            <button id="hard-refresh-btn" class="header-action-btn" title="Force Clear Cache & Refresh">
                <i class="fas fa-rotate"></i>
            </button>
            <nav class="nav-links">
                <button class="nav-btn active" data-target="home"><i class="fas fa-compact-disc"></i> Player</button>
                <button class="nav-btn" data-target="playlist"><i class="fas fa-list"></i> Tracks</button>
                <button class="nav-btn" data-target="favorites"><i class="fas fa-bookmark"></i> Library</button>
                <button class="nav-btn" data-target="downloads"><i class="fas fa-arrow-down"></i> Downloads</button>
            </nav>
        </header>

        <main class="main-content">
            <!-- Playlist Section -->
            <section class="playlist-section hidden" id="playlist">
                <h2>Featured Tracks</h2>
                
                <div class="search-container">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="search-input" placeholder="Search songs, artists, albums...">
                    <button id="search-btn">Search</button>
                </div>
                
                <div class="category-filters" id="category-filters">
                    <button class="cat-btn active" data-query="trending">Trending</button>
                    <button class="cat-btn" data-query="kannada">Kannada</button>
                    <button class="cat-btn" data-query="hindi">Hindi</button>
                    <button class="cat-btn" data-query="telugu">Telugu</button>
                    <button class="cat-btn" data-query="tamil">Tamil</button>
                    <button class="cat-btn" data-query="english">English Pop</button>
                    <button class="cat-btn" data-query="hip hop">Hip Hop</button>
                </div>

                <!-- Albums/Movies Results (hidden if empty) -->
                <div class="albums-section hidden" id="albums-section">
                    <h3>Albums & Movies</h3>
                    <div class="albums-grid" id="albums-container">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <h3 id="songs-section-title" style="display: none; font-size: 1.4rem; margin-bottom: 1rem; color: #fff; font-family: 'Outfit', sans-serif; border-left: 4px solid var(--primary-color); padding-left: 10px;">Songs</h3>
                <div class="playlist-grid" id="playlist-container">
                    <!-- Populated by JS -->
                </div>
            </section>

            <!-- Favorites Section (renamed to Library internally but matches #favorites target) -->
            <section class="playlist-section hidden" id="favorites">
                <div id="library-main-view">
                    <div class="section-header-row">
                        <h2>My Library</h2>
                        <button class="cat-btn" id="create-playlist-btn" style="background: var(--primary-color); border: none; box-shadow: 0 4px 10px rgba(240,84,84,0.3); font-weight: 600;"><i class="fas fa-plus"></i> Create Playlist</button>
                    </div>
                    <div class="library-grid" id="library-playlists-container">
                        <!-- Populated by JS -->
                    </div>
                </div>
                
                <div id="library-playlist-detail-view" class="hidden">
                    <div class="section-header-row">
                        <div style="display: flex; align-items: center; gap: 15px; flex-wrap: wrap;">
                            <button class="cat-btn" id="playlist-back-btn" style="padding: 6px 12px;"><i class="fas fa-arrow-left"></i> Back</button>
                            <h2 id="playlist-detail-title" style="margin: 0;">Playlist Name</h2>
                            <button class="cat-btn" id="playlist-share-btn" style="padding: 6px 12px; background: #25d366; color: white; border: none; box-shadow: 0 4px 10px rgba(37,211,102,0.3); font-weight: 600;" title="Share Playlist via WhatsApp"><i class="fab fa-whatsapp"></i> Share</button>
                        </div>
                        <div class="mini-search-box">
                            <input type="text" id="favorites-search-input" placeholder="Search songs...">
                            <i class="fas fa-search"></i>
                        </div>
                    </div>
                    <div class="playlist-grid" id="favorites-container">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </section>

            <!-- Downloads Section -->
            <section class="playlist-section hidden" id="downloads">
                <div class="section-header-row">
                    <h2>Downloaded Songs</h2>
                    <div class="mini-search-box">
                        <input type="text" id="downloads-search-input" placeholder="Search offline songs...">
                        <i class="fas fa-search"></i>
                    </div>
                </div>
                <div class="playlist-grid" id="downloads-container">
                    <!-- Populated by JS -->
                </div>
            </section>

            <!-- Player Section -->
            <section class="player-section" id="home">
                <div class="player-wrapper">
                    <!-- Retro DJ Bot Container -->
                    <div id="retro-bot-container" class="bot-container hiding">
                        <div id="bot-character-sprite"></div>
                        <div id="bot-chatbox" class="bot-chatbox">
                            <!-- Populated by JS -->
                        </div>
                    </div>
                    <div class="radio-box">
                    <div class="speaker-grill left">
                        <div class="speaker-cone"></div>
                    </div>
                    
                    <div class="center-console">
                        <!-- Retro Tuner Screen -->
                        <div class="tuner-display">
                            <div class="now-playing-info">
                                <div class="marquee-wrapper">
                                    <h3 id="track-title">Loading...</h3>
                                </div>
                                <div class="marquee-wrapper">
                                    <p id="track-artist">Haadio</p>
                                </div>
                            </div>
                        </div>

                        <!-- Cassette / Vinyl Record Element -->
                        <div class="cassette-container">
                            <div class="record" id="record">
                                <div class="record-center">
                                    <div class="record-label">
                                        <span id="label-title">HAADIO</span>
                                    </div>
                                    <div class="record-hole"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Controls -->
                        <div class="controls">
                            <div class="secondary-controls">
                                <button class="control-btn mini-btn" id="shuffle-btn" title="Shuffle Mode"><i class="fas fa-shuffle"></i></button>
                                <button class="control-btn mini-btn" id="repeat-btn" title="Repeat Mode"><i class="fas fa-repeat"></i></button>
                            </div>
                            <div class="progress-container">
                                <span id="current-time">0:00</span>
                                <input type="range" id="progress-bar" value="0" min="0" max="100" step="0.1">
                                <span id="total-time">0:00</span>
                            </div>
                            <div class="buttons">
                                <button class="control-btn" id="like-btn"><i class="far fa-heart"></i></button>
                                <button class="control-btn" id="prev-btn"><i class="fas fa-backward-step"></i></button>
                                <button class="control-btn play-btn" id="play-btn"><i class="fas fa-play"></i></button>
                                <button class="control-btn" id="next-btn"><i class="fas fa-forward-step"></i></button>
                                <button class="control-btn" id="download-btn"><i class="fas fa-download"></i></button>
                            </div>
                        </div>
                    </div>

                    <div class="speaker-grill right">
                        <div class="speaker-cone"></div>
                    </div>
                </div>
            </div>
            </section>
        </main>
        <!-- Bottom Navigation Bar for Mobile -->
        <nav class="bottom-nav">
            <button class="nav-btn active" data-target="home"><i class="fas fa-compact-disc"></i> <span>Player</span></button>
            <button class="nav-btn" data-target="playlist"><i class="fas fa-list"></i> <span>Tracks</span></button>
            <button class="nav-btn" data-target="favorites"><i class="fas fa-bookmark"></i> <span>Library</span></button>
            <button class="nav-btn" data-target="downloads"><i class="fas fa-arrow-down"></i> <span>Downloads</span></button>
        </nav>
    <!-- Add to Playlist Modal -->
    <div id="playlist-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Add to Playlist</h3>
                <button class="modal-close-btn" id="close-playlist-modal-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="playlist-options-list" id="playlist-options-list" style="max-height: 300px; margin-bottom: 0;">
                    <!-- Dynamic playlist list -->
                </div>
            </div>
        </div>
    </div>

    <audio id="audio-player"></audio>
    <script src="app.js?v=34"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => {
                    console.log('Service Worker registered');
                    
                    reg.addEventListener('updatefound', () => {
                        const newWorker = reg.installing;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                console.log('New update installed, reloading...');
                                window.location.reload();
                            }
                        });
                    });
                }).catch(err => {
                    console.log('Service Worker registration failed', err);
                });
            });
            
            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (!refreshing) {
                    refreshing = true;
                    window.location.reload();
                }
            });
        }
    </script>
</body>
</html>
